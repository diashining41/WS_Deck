name: accumulate

# Daily forward accumulation of X tournament posts.
#
# Each run discovers new tournament tweets (nitter RSS), stores them with their
# links, downloads their images, pushes those images to R2, and re-exports the
# static snapshot from Neon. Only the snapshot is committed — the images
# themselves never enter git (the archive is ~3GB and growing; see .gitignore).
#
# Requires these repository secrets:
#   DATABASE_URL           free Neon Postgres connection string
#   R2_ACCOUNT_ID          Cloudflare R2 (free tier: 10GB, zero egress)
#   R2_ACCESS_KEY_ID
#   R2_SECRET_ACCESS_KEY
#   R2_BUCKET
#
# The site (Vercel) auto-redeploys when this workflow pushes the snapshot.

on:
  schedule:
    - cron: '0 21 * * *' # 06:00 KST daily — after the evening's tournaments
  workflow_dispatch: {} # also runnable by hand from the Actions tab

concurrency:
  group: accumulate
  cancel-in-progress: false

permissions:
  contents: write # to commit the refreshed snapshot back

jobs:
  accumulate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Fail before touching anything. The runner is ephemeral: if it downloads
      # images and then can't reach R2, the image rows land in the DB pointing at
      # files that exist nowhere — permanently broken thumbnails. Better to stop.
      - name: R2 자격증명 확인 (없으면 이미지 유실되므로 즉시 중단)
        run: |
          if [ -z "$R2_ACCOUNT_ID" ] || [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ] || [ -z "$R2_BUCKET" ]; then
            echo "::error::R2 시크릿이 없습니다. npm run setup:cloud 로 등록하세요."
            exit 1
          fi

      - name: 새 대회 트윗 발견 (nitter)
        run: npm run poll

      # Bounded on purpose. upload:r2 runs only AFTER this step finishes, so a
      # backlog big enough to hit the 6h job limit would strand every image it
      # downloaded: the DB rows would point at files that died with the runner.
      # A cap guarantees the job reaches the upload step. A day brings ~30 new
      # posts, so 400 is slack; a larger backlog just drains 400 a day.
      - name: 이미지 수집 + 자동 분류
        env:
          LIMIT: 400
        run: npm run backfill:images

      # The runner is ephemeral, so the images it just downloaded exist nowhere
      # else — they must reach R2 in this same job or they are lost.
      - name: 이미지를 R2에 업로드
        run: npm run upload:r2

      - name: 정적 스냅샷 갱신
        run: npm run export:static

      - name: 스냅샷 커밋 & 푸시 (→ Vercel 재배포)
        run: |
          git config user.name "ws-deckcheck-bot"
          git config user.email "bot@users.noreply.github.com"
          git add src/generated/data.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 새 대회 글 없음"
          else
            git commit -m "accumulate: $(date -u +%Y-%m-%d) 새 대회 덱 수집"
            git push
          fi
